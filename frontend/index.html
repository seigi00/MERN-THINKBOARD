<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Breadcrumb</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div>
          <p class="eyebrow">
            <span class="brand-mark" aria-hidden="true">
              <svg viewBox="0 0 64 64" role="img" focusable="false">
                <circle cx="16" cy="32" r="8"></circle>
                <circle cx="32" cy="28" r="6"></circle>
                <circle cx="46" cy="23" r="4"></circle>
              </svg>
            </span>
            Breadcrumb
          </p>
          <h1>Notes are the breadcrumb of thought.</h1>
          <p class="lead">A full-stack MERN notebook for capturing ideas, organizing thoughts, and revisiting them with clarity.</p>
        </div>
        <div class="hero-card">
          <span class="dot"></span>
          <div>
            <strong>Live connected</strong>
            <p>Backend API: <span id="apiState">loading...</span></p>
          </div>
          <button type="button" id="themeToggle" class="ghost-button theme-toggle" aria-label="Toggle dark mode">Dark mode</button>
        </div>
      </section>

      <section class="workspace">
        <form id="noteForm" class="panel form-panel">
          <div class="panel-header">
            <div>
              <p class="section-label">Write a note</p>
              <h2 id="formTitle">Create note</h2>
            </div>
            <button type="button" id="resetBtn" class="ghost-button hidden">Cancel edit</button>
          </div>

          <label>
            <span>Title</span>
            <input id="titleInput" name="title" type="text" placeholder="Short, memorable title" maxlength="120" required />
          </label>

          <label>
            <span>Description</span>
            <textarea id="descriptionInput" name="description" rows="6" placeholder="What do you want to remember?" maxlength="1000" required></textarea>
          </label>

          <div class="form-footer">
            <p id="statusText" class="status-text">Ready to write.</p>
            <button type="submit" class="primary-button" id="submitBtn">Save note</button>
          </div>
        </form>

        <section class="panel list-panel">
          <div class="panel-header">
            <div>
              <p class="section-label">Your board</p>
              <h2>Notes</h2>
            </div>
            <span id="noteCount" class="count-pill">0 notes</span>
          </div>

          <div id="notesList" class="notes-list"></div>
        </section>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
